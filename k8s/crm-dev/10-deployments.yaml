  namespace: crm-dev
spec:
  replicas: 1
  selector: { matchLabels: { app: pd-ms-auth-service } }
  template:
    metadata: { labels: { app: pd-ms-auth-service } }
    spec:
      imagePullSecrets: [{ name: dockerhub }]
      containers:
        - name: app
          image: sysadminaffiniti/affiniti_dms_ms_auth_service:pd-revamp-latest
          imagePullPolicy: Always
          ports: [{ containerPort: 8401 }]
          env:
            - { name: SERVER_PORT, value: "8401" }
            - { name: SPRING_CONFIG_USELEGACYPROCESSING, value: "true" }
            - { name: SPRING_DATASOURCE_URL,      valueFrom: { secretKeyRef: { name: mariadb, key: url } } }
            - { name: SPRING_DATASOURCE_USERNAME, valueFrom: { secretKeyRef: { name: mariadb, key: username } } }
            - { name: SPRING_DATASOURCE_PASSWORD, valueFrom: { secretKeyRef: { name: mariadb, key: password } } }
---
apiVersion: v1
kind: Service
metadata: { name: pd-ms-auth-service, namespace: crm-dev }
spec:
  selector: { app: pd-ms-auth-service }
  ports: [{ port: 8401, targetPort: 8401 }]

