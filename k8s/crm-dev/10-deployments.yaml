# docker-composer (QA) stack → namespace crm-dev
# Images will be pushed to Docker Hub as sysadminaffiniti/<name>:pd-revamp-latest
# during Phase 3a (see runbook/03-phase3-node3-migration.md).

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pd-discovery-service
  namespace: crm-dev
spec:
  replicas: 1
  selector: { matchLabels: { app: pd-discovery-service } }
  template:
    metadata: { labels: { app: pd-discovery-service } }
    spec:
      imagePullSecrets: [{ name: dockerhub }]
      containers:
        - name: app
          image: sysadminaffiniti/affiniti_dms_ms_discovery_server:pd-revamp-latest
          imagePullPolicy: Always
          ports: [{ containerPort: 8400 }]
          env:
            - { name: SERVER_PORT, value: "8400" }
            - { name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE, value: "http://pd-discovery-service:8400/eureka" }
            - { name: EUREKA_INSTANCE_PREFER_IP_ADDRESS, value: "true" }
---
apiVersion: v1
kind: Service
metadata: { name: pd-discovery-service, namespace: crm-dev }
spec:
  selector: { app: pd-discovery-service }
  ports: [{ port: 8400, targetPort: 8400 }]

---
apiVersion: apps/v1
