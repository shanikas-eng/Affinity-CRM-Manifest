---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pd-crm-web-jsp
  namespace: crm-dev
spec:
  replicas: 1
  selector: { matchLabels: { app: pd-crm-web-jsp } }
  template:
    metadata: { labels: { app: pd-crm-web-jsp } }
    spec:
      imagePullSecrets: [{ name: dockerhub }]
      containers:
        - name: app
          image: sysadminaffiniti/affiniti_crm_web_jsp:pd-revamp-latest
          imagePullPolicy: Always
          ports: [{ containerPort: 8222 }]
          env:
            - { name: SERVER_PORT, value: "8222" }
            - { name: SERVER_SERVLET_CONTEXT_PATH, value: "/lg/" }
            - { name: PROXY_PATH, value: "https://crm-dev.affiniti-crm.duckdns.org/md" }
            - { name: AUTH_TOKEN_CREATE_URL,  value: "http://pd-ms-auth-service:8401/api/auth-service/oauth/token" }
            - { name: AUTH_TOKEN_REFRESH_URL, value: "http://pd-ms-auth-service:8401/api/auth-service/oauth/token" }
            - { name: AUTH_TOKEN_CHECK_URL,   value: "http://pd-ms-auth-service:8401/api/auth-service/oauth/check_token" }
            # Session timeout — untouched, points at Node 3 :80 (Finance Web legacy app on Caddy).
            - { name: SESSION_TIMEOUT_URL,    value: "http://165.22.250.39:80/AFFINITI_DMS_FINANCE_WEB/?auth=logout" }
            - { name: JASPER_HOST, value: "178.128.92.244" }
            - { name: JASPER_PORT, value: "9191" }
            - { name: SLA_ABOUTTOVIOLATE_THRESHOLD, value: "0.75" }
            - { name: SPRING_DATASOURCE_URL,      valueFrom: { secretKeyRef: { name: mariadb, key: url } } }
            - { name: SPRING_DATASOURCE_USERNAME, valueFrom: { secretKeyRef: { name: mariadb, key: username } } }
            - { name: SPRING_DATASOURCE_PASSWORD, valueFrom: { secretKeyRef: { name: mariadb, key: password } } }
---
apiVersion: v1
kind: Service
metadata: { name: pd-crm-web-jsp, namespace: crm-dev }
spec:
  selector: { app: pd-crm-web-jsp }
  ports: [{ port: 8222, targetPort: 8222 }]

# ─── Worker/cron services (no ClusterIP Service needed) ────────────────────

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pd-360-es-sv
  namespace: crm-dev
spec:
  replicas: 1
  selector: { matchLabels: { app: pd-360-es-sv } }
  template:
    metadata: { labels: { app: pd-360-es-sv } }
    spec:
      imagePullSecrets: [{ name: dockerhub }]
      containers:
        - name: app
          image: sysadminaffiniti/affiniti_hnbf_360_es_sv:pd-revamp-latest
          imagePullPolicy: Always
          env:
            - { name: SPRING_DATASOURCE_URL,      valueFrom: { secretKeyRef: { name: mariadb, key: url } } }
            - { name: SPRING_DATASOURCE_USERNAME, valueFrom: { secretKeyRef: { name: mariadb, key: username } } }
            - { name: SPRING_DATASOURCE_PASSWORD, valueFrom: { secretKeyRef: { name: mariadb, key: password } } }
            - { name: CRONJOB_EXECUTION_HRS, value: "11" }
            - { name: CRONJOB_EXECUTION_MIN, value: "45" }
            - { name: CRONJOB_DELAY, value: "100000" }
            - { name: CRONJOB_START_TIME, value: "08:00:00" }
            - { name: CRONJOB_END_TIME, value: "20:00:00" }
            - { name: LEADSCOREUPDATE_CRONJOB_TICKET_RUN, value: "true" }
            - { name: LEADSCOREUPDATE_CRONJOB_TICKET_EXECUTIONTIME, value: "0 40 14 * * *" }
            - { name: LEADSCOREUPDATE_CRONJOB_CONTACT_RUN, value: "true" }
            - { name: LEADSCOREUPDATE_CRONJOB_CONTACT_EXECUTIONTIME, value: "0 40 15 * * *" }
            - { name: SLA_VIOLATION_SEND_ESCALATION_EMAIL, value: "true" }
            - { name: CROSSSELL_CRONJOB_RUN, value: "true" }
            - { name: CROSSSELL_CRONJOB_EXECUTIONTIME, value: "100000" }
            - { name: SLA_VIOLATION_EMAIL_EXECUTIONTIME, value: "0 47 17 * * *" }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pd-crm-contact-sync-sv
  namespace: crm-dev
spec:
  replicas: 1
  selector: { matchLabels: { app: pd-crm-contact-sync-sv } }
  template:
    metadata: { labels: { app: pd-crm-contact-sync-sv } }
    spec:
      imagePullSecrets: [{ name: dockerhub }]
      containers:
        - name: app
          image: sysadminaffiniti/affiniti_crm_contact_sync_sv:pd-revamp-latest
          imagePullPolicy: Always
          env:
            - { name: SPRING_DATASOURCEPRIMARY_DRIVERCLASSNAME,  value: "org.mariadb.jdbc.Driver" }
            - { name: SPRING_DATASOURCEPRIMARY_URL,      valueFrom: { secretKeyRef: { name: mariadb, key: url } } }
            - { name: SPRING_DATASOURCEPRIMARY_USERNAME, valueFrom: { secretKeyRef: { name: mariadb, key: username } } }
            - { name: SPRING_DATASOURCEPRIMARY_PASSWORD, valueFrom: { secretKeyRef: { name: mariadb, key: password } } }
            - { name: SPRING_DATASOURCESECONDARY_DRIVERCLASSNAME, value: "org.mariadb.jdbc.Driver" }
            - { name: SPRING_DATASOURCESECONDARY_URL,      valueFrom: { secretKeyRef: { name: mariadb, key: url } } }
            - { name: SPRING_DATASOURCESECONDARY_USERNAME, valueFrom: { secretKeyRef: { name: mariadb, key: username } } }
            - { name: SPRING_DATASOURCESECONDARY_PASSWORD, valueFrom: { secretKeyRef: { name: mariadb, key: password } } }
            - { name: APP_CRONJOB_EXECUTION_HRS, value: "00" }
            - { name: APP_CRONJOB_EXECUTION_MIN, value: "50" }
            - { name: MAX_PAGE_SIZE, value: "500" }

---
apiVersion: apps/v1
