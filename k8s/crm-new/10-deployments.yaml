# v3_dev stack → namespace crm-new
# All Deployments + ClusterIP Services.
# Env vars use Spring Boot relaxed-binding UPPER_UNDERSCORE form
# (k8s Pod env names must match C_IDENTIFIER — no dots/dashes allowed).
#
# Image tag pinning: change ":v3-latest" to a specific tag once CI publishes them.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pd-discovery-service
  namespace: crm-new
spec:
  replicas: 1
  selector: { matchLabels: { app: pd-discovery-service } }
  template:
    metadata: { labels: { app: pd-discovery-service } }
    spec:
      imagePullSecrets: [{ name: dockerhub }]
      containers:
        - name: app
          image: sysadminaffiniti/affiniti_dms_ms_discovery_server:1.0.0.1311
          imagePullPolicy: Always
          ports: [{ containerPort: 8400 }]
          env:
            - name: SERVER_PORT
              value: "8400"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://pd-discovery-service:8400/eureka"
---
apiVersion: v1
kind: Service
metadata: { name: pd-discovery-service, namespace: crm-new }
spec:
  selector: { app: pd-discovery-service }
  ports: [{ port: 8400, targetPort: 8400 }]

