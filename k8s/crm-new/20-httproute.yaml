apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crm-new
  namespace: crm-new
spec:
  parentRefs:
    - name: public
      namespace: gateway-system
      sectionName: https-crm
  hostnames:
    - "crm-new.affiniti-crm.duckdns.org"
  rules:
    # Auth service — dedicated path, must beat /api catch-all
    - matches:
        - path: { type: PathPrefix, value: /api/auth-service }
      backendRefs:
        - name: pd-ms-auth-service
          port: 8401
    # All other API traffic → API Gateway
    - matches:
        - path: { type: PathPrefix, value: /api }
      backendRefs:
        - name: pd-api-gateway-service
          port: 8402
    # React SPA — everything else
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: pd-v3-crm-frontend
          port: 80
