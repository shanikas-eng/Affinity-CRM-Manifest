# AppProject scopes what the Argo Applications may deploy.
# Deliberately narrow: only these two namespaces, only the resource kinds we ship.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: crm
  namespace: argocd
spec:
  description: "Affiniti CRM stacks migrated from Node 3 docker-compose"
  sourceRepos:
    - "*"     # tighten to the exact git repo URL once you know it
  destinations:
    - namespace: crm-new
      server: https://kubernetes.default.svc
    - namespace: crm-dev
      server: https://kubernetes.default.svc
    # HTTPRoute lives in the app namespace; no cluster-scoped writes needed.
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Service
    - group: apps
      kind: Deployment
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
  # Namespaces are pre-created out-of-band (see runbook §3.2). Do NOT let Argo
  # manage the Namespace resource — otherwise a sync-prune could wipe secrets.
